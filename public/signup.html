<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Widget - Create an Account</title>
    <style>
        /* Modern and clean styling for the signup page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            /* Matching dark SaaS background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* SIGNUP CARD CONTAINER */
        .auth-container {
            background-color: rgba(30, 41, 59, 0.5);
            /* Semi-transparent slate card */
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: inline-block;
            text-decoration: none;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* 📋 FORM & INPUTS */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        /* 🚀 BUTTONS & LINKS */
        .btn-submit {
            background: linear-gradient(to right, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }

        .auth-footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #818cf8;
        }

        #messageBox {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: #f8fafc;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .api-key-box {
            background: #0f172a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            color: #38bdf8;
            /* Tvoja plava boja */
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #334155;
            word-break: break-all;
        }

        body::before {
            content: "";

            position: fixed;
            inset: 0;

            background:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.25), transparent 30%),
                radial-gradient(circle at 80% 30%, rgba(56, 189, 248, 0.18), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(168, 85, 247, 0.18), transparent 30%);

            z-index: -2;

            animation: bgMove 12s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            0% {
                transform: translateY(0px) scale(1);
            }

            100% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        body::after {
            content: "";

            position: fixed;
            inset: 0;

            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);

            background-size: 60px 60px;

            z-index: -1;

            mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
        }

        .main-cta {
            position: relative;
            overflow: hidden;
        }

        .main-cta::before {
            content: "";

            position: absolute;
            top: 0;
            left: -120%;

            width: 120%;
            height: 100%;

            background:
                linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.4),
                    transparent);

            transform: skewX(-20deg);

            transition: 0.8s;
        }

        .main-cta:hover::before {
            left: 130%;
        }

        /* HERO GLOW */

        .auth-container {
            position: relative;
        }

        .auth-container::before {
            content: "";

            position: absolute;

            width: 500px;
            height: 500px;

            background: #6366f1;

            filter: blur(140px);

            opacity: 0.15;

            z-index: -1;

            animation: pulseGlow 6s ease infinite;
        }

        

        /* FLOATING BADGES */

        .floating-badge {
            position: absolute;

            padding: 12px 18px;

            border-radius: 14px;

            background: rgba(255, 255, 255, 0.06);

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

            color: white;

            font-size: 14px;

            animation: floatBadge 5s ease-in-out infinite;
        }

        .badge1 {
            top: 18%;
            left: 8%;
        }

        .badge2 {
            top: 30%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes floatBadge {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <a href="index.html" class="logo">SocialProof.io</a>
        <h2>Create account</h2>
        <p class="subtitle">Start boosting your conversions for free</p>

        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" required>
            </div>
            <button type="submit" class="btn-submit">Get Started Free</button>
        </form>

        <div id="messageBox" style="display: none;"></div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const messageBox = document.getElementById('messageBox');

        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Učitavanje vrednosti
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (messageBox) {
                    messageBox.style.display = 'block';
                    messageBox.innerText = 'Registering...';
                }

                try {
                    const response = await fetch('https://saas-social-proof.onrender.com/api/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        if (messageBox) {
                            messageBox.innerHTML = `<strong>Success!</strong> Your API Key: <br> ${data.apiKey}`;
                        }
                        form.reset();
                    } else {
                        if (messageBox) messageBox.innerText = 'Error: ' + (data.message || 'Signup failed');
                    }
                } catch (error) {
                    if (messageBox) messageBox.innerText = 'Server error. Please try again.';
                }
            });
        } else {
            console.error("Forma sa ID-jem 'signupForm' nije pronađena!");
        }
    </script>
</body>

</html>
