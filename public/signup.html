<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Widget - Create an Account</title>
    <style>
        /* Modern and clean styling for the signup page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Matching dark SaaS background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* SIGNUP CARD CONTAINER */
        .auth-container {
            background-color: rgba(30, 41, 59, 0.5); /* Semi-transparent slate card */
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: inline-block;
            text-decoration: none;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* 📋 FORM & INPUTS */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        /* 🚀 BUTTONS & LINKS */
        .btn-submit {
            background: linear-gradient(to right, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }

        .auth-footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #818cf8;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="logo">SocialProof.io</a>
        <h2>Create account</h2>
        <p class="subtitle">Start boosting your conversions for free</p>

        <form id="signupForm">
            <div id="messageBox" style="display: none; margin-top: 20px; text-align: center; color: #fff;"></div>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" required>
            </div>
            <button type="submit" class="btn-submit">Get Started Free</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            // Hide previous messages
            messageBox.style.display = 'none';
            messageBox.className = 'message';

            try {
                // For local testing you can use: 'http://localhost:5000/api/signup'
                const response = await fetch('https://saas-social-proof.onrender.com/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Registration successful - display message and the generated API Key
                    messageBox.classList.add('success');
                    messageBox.innerHTML = `
                        <strong>${data.message}</strong><br><br>
                        Your API Key (Keep it safe):
                        <div class="api-key-box">${data.apiKey}</div>
                    `;
                    messageBox.style.display = 'block';
                    
                    // Reset the form fields
                    document.getElementById('signupForm').reset();
                } else {
                    // Server returned an error (e.g., user already exists)
                    messageBox.classList.add('error');
                    messageBox.innerText = data.error || "Something went wrong.";
                    messageBox.style.display = 'block';
                }

            } catch (err) {
                // Network error or server is down
                messageBox.classList.add('error');
                messageBox.innerText = "Cannot connect to the server. Please try again later.";
                messageBox.style.display = 'block';
                console.error("Signup fetch error:", err);
            }
        });
    </script>
</body>
</html>
