<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Widget - Create an Account</title>
    <style>
        /* Modern and clean styling for the signup page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #333333;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            word-break: break-all;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .api-key-box {
            margin-top: 15px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Choose a secure password">
            </div>
            <button type="submit">Sign Up</button>
        </form>

        <div id="messageBox" class="message"></div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            // Hide previous messages
            messageBox.style.display = 'none';
            messageBox.className = 'message';

            try {
                // 🚀 IMPORTANT: Replace this URL with your actual Render backend URL later!
                // For local testing you can use: 'http://localhost:5000/api/signup'
                const response = await fetch('https://saas-social-proof.onrender.com/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Registration successful - display message and the generated API Key
                    messageBox.classList.add('success');
                    messageBox.innerHTML = `
                        <strong>${data.message}</strong><br><br>
                        Your API Key (Keep it safe):
                        <div class="api-key-box">${data.apiKey}</div>
                    `;
                    messageBox.style.display = 'block';
                    
                    // Reset the form fields
                    document.getElementById('signupForm').reset();
                } else {
                    // Server returned an error (e.g., user already exists)
                    messageBox.classList.add('error');
                    messageBox.innerText = data.error || "Something went wrong.";
                    messageBox.style.display = 'block';
                }

            } catch (err) {
                // Network error or server is down
                messageBox.classList.add('error');
                messageBox.innerText = "Cannot connect to the server. Please try again later.";
                messageBox.style.display = 'block';
                console.error("Signup fetch error:", err);
            }
        });
    </script>
</body>
</html>
