<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Instalacija Widgeta</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #a0aec0;
            margin-bottom: 25px;
            font-size: 14px;
        }

        code {
            background-color: #0d1117;
            color: #58a6ff;
            padding: 20px;
            display: block;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: inline-block;
            text-decoration: none;
        }

        .btn {
            width: 100%;
            background: linear-gradient(to right, #818cf8, #6366f1);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }

        .auth-footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #818cf8;
        }


        body::before {
            content: "";

            position: fixed;
            inset: 0;

            background:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.25), transparent 30%),
                radial-gradient(circle at 80% 30%, rgba(56, 189, 248, 0.18), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(168, 85, 247, 0.18), transparent 30%);

            z-index: -2;
        }

        body::after {
            content: "";

            position: fixed;
            inset: 0;

            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);

            background-size: 60px 60px;

            z-index: -1;

            mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
        }

        /* HERO GLOW */

        .auth-container {
            position: relative;
        }

        .auth-container::before {
            content: "";

            position: absolute;

            width: 300px;
            height: 300px;

            right: 60px;

            top: -60px;

            background: #6366f1;

            filter: blur(140px);

            opacity: 0.15;

            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="card">
            <a href="index.html" class="logo">SocialProof.io</a>
            <h1>Widget Installation Guide</h1>
            <p>Copy this code and paste it on your site, right above the closing &lt;/body&gt; tag:</p>

            <code id="code-snippet">Loading...</code>

            <button id="copyBtn" class="btn">Copy code</button>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>
    <script>

        document.addEventListener('DOMContentLoaded', () => {
            // Uzimamo ključ iz URL adrese (posle ?key=)
            const urlParams = new URLSearchParams(window.location.search);
            const apiKey = urlParams.get('key');
            const codeElement = document.getElementById('code-snippet');
            const copyBtn = document.getElementById('copyBtn');


            if (apiKey) {
                // Ako je ključ tu, prikazujemo kod
                codeElement.innerText = `<script src="https://saas-social-proof.onrender.com/widget.js"><\/script>
            <script>
                    window.SAAS_CLIENT_API_KEY ="${apiKey}";
            <\/script>`;
            } else {
                // Ako ključa nema u URL-u
                codeElement.innerText = "Error: Please register first to get your API Key.";
            }

            copyBtn.addEventListener('click', () => {
                const textToCopy = codeElement.innerText;

                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = "Copied!";
                    setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
                }).catch(err => {
                    console.error('Greška pri kopiranju: ', err);
                });
            });
        }); 
    </script>
</body>

</html>
