<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            /* Adjusted height to fit both email and password fields comfortably */
            height: auto; 
            align-self: center;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>SaaS Panel Login</h2>
        
        <input type="email" id="email-field" placeholder="Enter email address" required>
        
        <input type="password" id="password-field" placeholder="Enter password" required>
        
        <button onclick="loginUser()">Enter the panel</button>
        
        <p id="error-msg" class="error"></p>
    </div>
</body>

<script>
    async function loginUser() {
        const email = document.getElementById('email-field').value;
        const password = document.getElementById('password-field').value;
        const errorMsg = document.getElementById('error-msg');

        // Hide any previous error messages
        errorMsg.style.display = 'none';

        try {
            // 🚀 Sending email and password to your Render backend login route
            const response = await fetch('https://saas-social-proof.onrender.com/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Securely store the JWT token and API Key inside sessionStorage
                sessionStorage.setItem('admin_token', data.token);
                sessionStorage.setItem('api_key', data.apiKey);
                
                // Redirecting the verified client to the admin dashboard
                window.location.href = 'admin.html'; 
            } else {
                // Display the specific error message sent by the server
                errorMsg.innerText = data.error || 'Invalid email or password.';
                errorMsg.style.display = 'block';
            }

        } catch (err) {
            errorMsg.innerText = 'An error occurred while connecting to the server.';
            errorMsg.style.display = 'block';
            console.error("Login fetch error:", err);
        }
    }
</script>

</html>
