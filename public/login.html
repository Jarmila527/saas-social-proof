<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f6;;
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            height: 500px;
            align-self: center;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

    </style>
</head>

<body>
    <div class="login-box">
        <h2>Saas Panel Login</h2>
        <input type="password" id="password-field" placeholder="Enter password">
        <button onclick="checkPassword()">Enter the panel</button>
        <p id="error-msg" class="error">Wrong password!</p>
    </div>
</body>

<script>
    function checkPassword() {
        const pass = document.getElementById('password-field').value;
        // Session Storage saves the password
        sessionStorage.setItem('admin_token', pass);
        // Entering the admin page
        window.location.href = '/admin.html';
    }
</script>

</html>
