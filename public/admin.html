<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 15px;
        }

        .header h2 {
            margin: 0;
            color: #1a202c;
            font-size: 22px;
            font-weight: 600;
        }

        .logout-btn {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #e53e3e;
            color: white;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background: #f8fafc;
        }

        input:focus {
            border-color: #3182ce;
            background: white;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #2b6cb0;
        }

        .footer-note {
            text-align: center;
            color: #718096;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <script>
        // Security check: If there is no token, redirect to login page instantly
        const token = sessionStorage.getItem('admin_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Logout function to clear session and redirect
        function logout() {
            sessionStorage.removeItem('admin_token');
            sessionStorage.removeItem('api_key');
            window.location.href = 'login.html';
        }
    </script>

    <div class="dashboard-container">
        <div class="header">
            <h2>Add Sale</h2>
            <button class="logout-btn" onclick="logout()">Log out</button>
        </div>

        <form id="purchase-form">
            <div class="form-group">
                <label for="apiKey">Your API Key (Managed Automatically)</label>
                <input type="text" id="apiKey" readonly style="background: #e2e8f0; color: #4a5568; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label for="name">Customer name</label>
                <input type="text" id="name" placeholder="eg Johan" required>
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="eg New York" required>
            </div>

            <div class="form-group">
                <label for="product">Purchased product</label>
                <input type="text" id="product" placeholder="eg Face serum" required>
            </div>

            <div class="form-group">
                <label for="languageText">Action text (Widget language)</label>
                <input type="text" id="languageText" placeholder="eg bought / je kupio / ordered" required>
            </div>

            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="bgColor">Widget Background</label>
                    <input type="color" id="bgColor" value="#ffffff" style="padding: 0; height: 40px; cursor: pointer;">
                </div>
                <div style="flex: 1;">
                    <label for="textColor">Text Color</label>
                    <input type="color" id="textColor" value="#1a202c"
                        style="padding: 0; height: 40px; cursor: pointer;">
                </div>
            </div>

            <button type="submit" class="submit-btn">Activate Notification</button>
        </form>

        <div class="footer-note">
            SaaS Social Proof Widget v1.0 &copy; 2026
        </div>
    </div>

    <script>
        // Automatically inject the logged-in user's API Key into the form field on page load
        document.getElementById('apiKey').value = sessionStorage.getItem('api_key') || '';

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userToken = sessionStorage.getItem('admin_token');

            const data = {
                apiKey: document.getElementById('apiKey').value.trim(),
                customerName: document.getElementById('name').value.trim(),
                city: document.getElementById('city').value.trim(),
                productName: document.getElementById('product').value.trim(),
                languageText: document.getElementById('languageText').value.trim(),
                bgColor: document.getElementById('bgColor').value,
                textColor: document.getElementById('textColor').value
            }

            try {
                const response = await fetch('https://saas-social-proof.onrender.com/api/add-purchase', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Sending the secure JWT token in the correct Bearer format
                        'Authorization': `Bearer ${userToken}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Notification successfully sent to the site!');
                    
                    // Reset the form but keep the API key filled in
                    document.getElementById('name').value = '';
                    document.getElementById('city').value = '';
                    document.getElementById('product').value = '';
                    document.getElementById('languageText').value = '';
                } else {
                    const errData = await response.json();
                    alert('Error: ' + (errData.error || errData.message));
                }

            } catch (err) {
                alert('An error occurred while connecting to the server.');
                console.error("Add purchase error:", err);
            }
        })
    </script>

</body>

</html>
