<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Proof Tool - Boost Your Website Conversions</title>
    <style>
        /* 🎨 GLOBAL STYLES & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            /* Modern dark SaaS background */
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* 🧭 NAVIGATION BAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-login {
            color: #94a3b8;
            margin-right: 25px;
        }

        .btn-login:hover {
            color: #fff;
        }

        .btn-signup {
            background: linear-gradient(to right, #3b82f6, #1d4ed8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        /* 🚀 HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 60px;
        }

        .hero h1 {
            font-size: 54px;
            font-weight: 800;
            line-height: 1.2;
            max-width: 800px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #94a3b8;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .hero .cta-buttons {
            display: flex;
            gap: 20px;
        }

        .main-cta {
            background: linear-gradient(to right, #818cf8, #6366f1);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        .main-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        /* ✨ ANIMATED BACKGROUND */

        body::before {
            content: "";

            position: fixed;
            inset: 0;

            background:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.25), transparent 30%),
                radial-gradient(circle at 80% 30%, rgba(56, 189, 248, 0.18), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(168, 85, 247, 0.18), transparent 30%);

            z-index: -2;

            animation: bgMove 12s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            0% {
                transform: translateY(0px) scale(1);
            }

            100% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* GRID OVERLAY */

        body::after {
            content: "";

            position: fixed;
            inset: 0;

            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);

            background-size: 60px 60px;

            z-index: -1;

            mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
        }

        /* NAVBAR IMPROVEMENT */

        nav {
            animation: fadeDown 1s ease;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HERO ANIMATION */

        .hero h1 {
            animation: fadeUp 1s ease forwards;
        }

        .hero p {
            opacity: 0;
            animation: fadeUp 1s ease forwards;
            animation-delay: 0.3s;
        }

        .cta-buttons {
            opacity: 0;
            animation: fadeUp 1s ease forwards;
            animation-delay: 0.6s;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* PREMIUM CTA */

        .main-cta {
            position: relative;
            overflow: hidden;
        }

        .main-cta::before {
            content: "";

            position: absolute;
            top: 0;
            left: -120%;

            width: 120%;
            height: 100%;

            background:
                linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.4),
                    transparent);

            transform: skewX(-20deg);

            transition: 0.8s;
        }

        .main-cta:hover::before {
            left: 130%;
        }

        /* HERO GLOW */

        .hero {
            position: relative;
        }

        .hero::before {
            content: "";

            position: absolute;

            width: 500px;
            height: 500px;

            background: #6366f1;

            filter: blur(140px);

            opacity: 0.15;

            z-index: -1;

            animation: pulseGlow 6s ease infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.15;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.22;
            }
        }

        /* FLOATING BADGES */

        .floating-badge {
            position: absolute;

            padding: 12px 18px;

            border-radius: 14px;

            background: rgba(255, 255, 255, 0.06);

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

            color: white;

            font-size: 14px;

            animation: floatBadge 5s ease-in-out infinite;
        }

        .badge1 {
            top: 18%;
            left: 8%;
        }

        .badge2 {
            top: 30%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes floatBadge {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">SocialProof.io</div>
        <div class="nav-links">
            <a href="login.html" class="btn-login">Log In</a>
            <a href="signup.html" class="btn-signup">Get Started Free</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Turn Website Visitors Into Customers Using Social Proof</h1>
        <p>Display real-time customer purchases and build instant trust with new visitors. Takes less than a minute to
            set up on any website.</p>

        <div class="cta-buttons">
            <a href="signup.html" class="main-cta">Create Free Account</a>
        </div>

        <div class="floating-badge badge1">
            🔥 +32% conversions
        </div>

        <div class="floating-badge badge2">
            ⚡ Live visitors
        </div>
    </section>
